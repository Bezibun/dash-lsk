<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | LSK Global Jaya Lingkungan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        :root { --lsk-green: #065f46; --lsk-yellow: #facc15; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .bg-lsk-green { background-color: var(--lsk-green); }
        .text-lsk-green { color: var(--lsk-green); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .modal-overlay { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(4px); }
        .animate-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-item.active { background-color: var(--lsk-green); color: white; box-shadow: 0 10px 15px -3px rgba(6, 95, 70, 0.2); }
        .status-badge { padding: 4px 12px; border-radius: 9999px; font-size: 10px; font-weight: 800; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
        .loader { width: 48px; height: 48px; border: 5px solid var(--lsk-green); border-bottom-color: transparent; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-slate-800 antialiased">

    <!-- LOGIN SECTION -->
    <div id="login-section" class="fixed inset-0 z-[100] flex items-center justify-center bg-lsk-green p-4">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl p-10 text-center animate-in">
            <div class="w-24 h-24 bg-lsk-yellow rounded-3xl flex items-center justify-center mx-auto mb-8 rotate-3 shadow-xl border-4 border-white">
                <img src="src/logo.png" alt="Logo" class="w-12 h-12 -rotate-3 object-contain">
            </div>
            <h1 class="text-3xl font-black text-slate-900 tracking-tighter uppercase mb-2">Admin Portal</h1>
            <p class="text-slate-500 font-medium text-sm mb-10">LSK Global Jaya Lingkungan</p>
            <form id="login-form" class="space-y-5 text-left">
                <input type="email" id="login-email" required class="w-full px-6 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none font-semibold" placeholder="Email Admin">
                <input type="password" id="login-password" required class="w-full px-6 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none font-semibold" placeholder="Kata Sandi">
                <button type="submit" class="w-full bg-lsk-green text-white py-5 rounded-[1.5rem] font-black uppercase tracking-widest hover:bg-emerald-900 shadow-lg flex items-center justify-center gap-3">
                    Masuk Sekarang <i data-lucide="arrow-right" class="w-5 h-5"></i>
                </button>
                <p id="login-error" class="hidden text-red-500 text-xs font-bold text-center p-4 rounded-xl border border-red-100"></p>
            </form>
        </div>
    </div>

    <!-- MAIN APP WRAPPER -->
    <div id="main-app" class="hidden min-h-screen flex flex-col lg:flex-row overflow-hidden">
        <aside class="w-full lg:w-80 bg-slate-900 text-white flex flex-col shrink-0 z-50">
            <div class="p-8 flex items-center gap-4 border-b border-slate-800/50">
                <div class="w-12 h-12 bg-lsk-yellow rounded-2xl flex items-center justify-center shadow-lg">
                    
                    <img src="src/logo.png" 
                        alt="Logo LSK GJL" 
                        class="w-11 h-11 md:w-12 md:h-12 object-contain rounded-full" 
                        style="filter: drop-shadow(2px 2px 4px rgba(34, 197, 94, 0.6)) drop-shadow(-2px -2px 4px rgba(234, 179, 8, 0.6));">
                </div>
                
                <div class="leading-tight">
                    <h2 class="text-sm font-black uppercase tracking-tight text-white">
                        Global Jaya
                    </h2>
                    <p class="text-[10px] text-slate-400 font-semibold uppercase tracking-wide">
                        Lingkungan
                    </p>
                </div>
            </div>
            <nav class="flex-1 p-6 space-y-2 overflow-y-auto custom-scrollbar">
                <button onclick="changeTab('dashboard')" id="nav-dashboard" class="nav-item active w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold text-sm transition-all"><i data-lucide="layout-grid" class="w-5 h-5"></i> Dashboard</button>
                <button onclick="changeTab('applicants')" id="nav-applicants" class="nav-item w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold text-sm text-slate-400 hover:text-white transition-all"><i data-lucide="users" class="w-5 h-5"></i> Data Pendaftar</button>
                <button onclick="changeTab('reports')" id="nav-reports" class="nav-item w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold text-sm text-slate-400 hover:text-white transition-all"><i data-lucide="file-bar-chart" class="w-5 h-5"></i> Rekap & Laporan</button>
            </nav>
            <div class="p-6 bg-slate-950/50 border-t border-slate-800/50">
                <button onclick="handleLogout()" class="w-full bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white py-4 rounded-2xl transition-all font-bold text-sm flex items-center justify-center gap-3">
                    <i data-lucide="log-out" class="w-4 h-4"></i> Keluar
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col bg-slate-50 overflow-hidden">
            <header class="h-20 bg-white border-b border-slate-200 px-8 flex items-center justify-between shrink-0">
                <h2 id="current-tab-title" class="text-xl font-black text-slate-900 uppercase tracking-tighter">Ringkasan Sistem</h2>
                <button onclick="refreshData()" class="p-3 bg-slate-100 hover:bg-slate-200 rounded-xl transition-all"><i data-lucide="refresh-cw" class="w-5 h-5"></i></button>
            </header>

            <div class="flex-1 overflow-y-auto p-8 custom-scrollbar relative">
                <!-- DASHBOARD TAB -->
                <section id="tab-dashboard" class="space-y-8 animate-in">
                    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6" id="dashboard-stats"></div>
                    <div class="grid grid-cols-1 xl:grid-cols-3 gap-8">
                        <div class="xl:col-span-2 bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-200"><canvas id="chart-applicants" class="h-[300px]"></canvas></div>
                        <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-200"><canvas id="chart-schemes" class="h-[300px]"></canvas></div>
                    </div>
                </section>

                <!-- APPLICANTS TAB -->
                <section id="tab-applicants" class="hidden space-y-6 animate-in">
                    <div class="flex flex-col md:flex-row gap-4 items-center justify-between bg-white p-6 rounded-[2rem] shadow-sm">
                        <input type="text" id="table-search" oninput="renderApplicantsTable()" placeholder="Cari nama atau skema..." class="w-full md:w-96 px-6 py-3.5 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-lsk-green font-semibold">
                        <select id="filter-status" onchange="renderApplicantsTable()" class="px-6 py-3.5 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold text-xs uppercase">
                            <option value="all">Semua Status</option>
                            <option value="Terverifikasi">Terverifikasi</option>
                            <option value="Belum Verifikasi">Belum Verifikasi</option>
                        </select>
                    </div>
                    <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-200 overflow-hidden">
                        <div class="overflow-x-auto">
                            <table class="w-full text-left">
                                <thead class="bg-slate-50 border-b">
                                    <tr>
                                        <th class="px-8 py-6 text-[10px] font-black uppercase text-slate-400">Pendaftar</th>
                                        <th class="px-8 py-6 text-[10px] font-black uppercase text-slate-400">Asal Instansi</th>
                                        <th class="px-8 py-6 text-[10px] font-black uppercase text-slate-400">Skema</th>
                                        <th class="px-8 py-6 text-[10px] font-black uppercase text-slate-400">Batch</th>
                                        <th class="px-8 py-6 text-[10px] font-black uppercase text-slate-400">Pembayaran</th>
                                        <th class="px-8 py-6 text-[10px] font-black uppercase text-slate-400">Status Berkas</th>
                                        <th class="px-8 py-6 text-[10px] font-black uppercase text-slate-400 text-center">Aksi</th>
                                    </tr>
                                </thead>
                                <tbody id="applicants-tbody" class="divide-y divide-slate-50"></tbody>
                            </table>
                        </div>
                    </div>
                </section>

                <!-- REPORTS TAB -->
                <section id="tab-reports" class="hidden space-y-8 animate-in">
                    <div class="bg-white p-10 rounded-[3rem] shadow-sm border border-slate-200">
                        <h3 class="text-2xl font-black text-slate-900 mb-8 uppercase tracking-tighter">Ekspor Laporan PDF</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                            <button onclick="generatePDF('all')" class="p-8 bg-slate-50 border-2 border-slate-100 rounded-[2rem] hover:border-lsk-green hover:bg-white transition-all text-left group">
                                <div class="w-14 h-14 bg-white rounded-2xl flex items-center justify-center mb-6 shadow-sm group-hover:bg-lsk-green group-hover:text-white transition-all"><i data-lucide="file-text"></i></div>
                                <h4 class="font-black text-slate-800 uppercase text-sm mb-2">Semua Pendaftar</h4>
                                <p class="text-xs text-slate-400 leading-relaxed">Unduh rekap data lengkap seluruh peserta yang sudah mendaftar di sistem.</p>
                            </button>
                            <button onclick="generatePDF('verified')" class="p-8 bg-slate-50 border-2 border-slate-100 rounded-[2rem] hover:border-lsk-green hover:bg-white transition-all text-left group">
                                <div class="w-14 h-14 bg-white rounded-2xl flex items-center justify-center mb-6 shadow-sm group-hover:bg-emerald-600 group-hover:text-white transition-all"><i data-lucide="check-circle"></i></div>
                                <h4 class="font-black text-slate-800 uppercase text-sm mb-2">Hanya Terverifikasi</h4>
                                <p class="text-xs text-slate-400 leading-relaxed">Rekap khusus peserta yang dokumennya sudah dinyatakan valid oleh admin.</p>
                            </button>
                            <button onclick="generatePDF('unpaid')" class="p-8 bg-slate-50 border-2 border-slate-100 rounded-[2rem] hover:border-lsk-green hover:bg-white transition-all text-left group">
                                <div class="w-14 h-14 bg-white rounded-2xl flex items-center justify-center mb-6 shadow-sm group-hover:bg-red-600 group-hover:text-white transition-all"><i data-lucide="wallet"></i></div>
                                <h4 class="font-black text-slate-800 uppercase text-sm mb-2">Belum Lunas</h4>
                                <p class="text-xs text-slate-400 leading-relaxed">Daftar peserta yang masih memiliki tunggakan atau belum membayar.</p>
                            </button>
                        </div>
                        <div id="batch-buttons" class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-6"></div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- MODAL: REVIEW & MANAJEMEN BERKAS -->
    <div id="modal-review" class="fixed inset-0 z-[110] hidden flex items-center justify-center p-4 lg:p-10">
        <div class="fixed inset-0 modal-overlay" onclick="closeModal('modal-review')"></div>
        <div class="bg-white w-full max-w-6xl h-full lg:h-auto lg:max-h-[90vh] rounded-[3rem] shadow-2xl relative z-20 flex flex-col overflow-hidden animate-in">
            <div class="p-8 border-b flex items-center justify-between shrink-0">
                <div class="flex items-center gap-5">
                    <div class="w-14 h-14 bg-lsk-yellow rounded-2xl flex items-center justify-center shadow-lg"><i data-lucide="folder-search" class="text-lsk-green"></i></div>
                    <div>
                        <h3 id="review-name" class="text-xl font-black text-slate-900 tracking-tight uppercase leading-none mb-1">Nama Peserta</h3>
                        <p id="review-skema" class="text-[10px] font-black text-emerald-600 uppercase tracking-widest">Skema Sertifikasi</p>
                    </div>
                </div>
                <button onclick="closeModal('modal-review')" class="p-4 bg-slate-50 rounded-2xl hover:bg-slate-100 transition-all"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            <div class="flex-1 overflow-y-auto p-10 bg-slate-50/50 custom-scrollbar">
                <div id="berkas-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8"></div>
            </div>
            <div class="p-8 border-t flex flex-col md:flex-row justify-between items-center bg-white gap-4">
                <div class="flex gap-3 w-full md:w-auto">
                    <button id="btn-unverify" class="flex-1 md:flex-none px-8 py-4 bg-red-50 text-red-600 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-red-600 hover:text-white transition-all">Tolak Verifikasi</button>
                    <button id="btn-verify" class="flex-1 md:flex-none px-8 py-4 bg-lsk-green text-white rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-emerald-900 transition-all shadow-lg">Verifikasi Sekarang</button>
                </div>
                <p class="text-[10px] text-slate-400 font-bold italic text-center md:text-right">Admin memiliki otoritas penuh untuk menghapus dan memperbaiki berkas peserta.</p>
            </div>
        </div>
    </div>

    <!-- ADMIN ACTION INPUTS -->
    <input type="file" id="admin-upload-input" class="hidden" accept=".jpg,.jpeg,.png,.pdf">

    <!-- TOASTS -->
    <div id="toast-container" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[200] flex flex-col gap-2 pointer-events-none"></div>

    <script>
        const SUPABASE_URL = "https://lethwgfaqxrdhwcqctze.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_hbYoS1xiqoQwJ2F1e7lTgg_uO7hxx-y";
        const BUCKET_NAME = "berkas_lsk";
        const { createClient } = supabase;
        const _supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let applicantData = [];
        let currentApplicant = null;
        let mainChart = null, schemeChart = null;
        let activeUploadKey = null;

        window.onload = () => { lucide.createIcons(); checkAuth(); };

        async function checkAuth() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) showApp(session.user);
        }

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
            if (error) {
                const err = document.getElementById('login-error');
                err.textContent = "Login Gagal: " + error.message; err.classList.remove('hidden');
            } else showApp(data.user);
        };

        function showApp(user) {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            refreshData();
        }

        async function handleLogout() { await _supabase.auth.signOut(); window.location.reload(); }

        async function refreshData() {
            const { data, error } = await _supabase.from('pendaftaran').select('*').order('created_at', { ascending: false });
            if (!error) {
                applicantData = data;
                updateStats(); renderApplicantsTable(); initCharts(); renderBatchButtons();
            }
        }

        function changeTab(tabId) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById('tab-' + tabId).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('nav-' + tabId).classList.add('active');
            const titles = { 'dashboard': 'Ringkasan Sistem', 'applicants': 'Kelola Peserta', 'reports': 'Rekap & Laporan' };
            document.getElementById('current-tab-title').textContent = titles[tabId];
            lucide.createIcons();
        }

        function updateStats() {
            const container = document.getElementById('dashboard-stats');
            const stats = [
                { label: 'Total Peserta', val: applicantData.length, color: 'blue', icon: 'users' },
                { label: 'Terverifikasi', val: applicantData.filter(a => a.status_verifikasi === 'Terverifikasi').length, color: 'emerald', icon: 'check-circle' },
                { label: 'Belum Lunas', val: applicantData.filter(a => a.status_pembayaran !== 'sudah bayar').length, color: 'red', icon: 'wallet' },
                { label: 'Menunggu', val: applicantData.filter(a => a.status_verifikasi !== 'Terverifikasi').length, color: 'amber', icon: 'clock' }
            ];
            container.innerHTML = stats.map(s => `
                <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-200 flex items-center gap-6 group hover:shadow-xl transition-all duration-300">
                    <div class="w-16 h-16 bg-${s.color}-50 text-${s.color}-600 rounded-3xl flex items-center justify-center group-hover:scale-110 transition-transform"><i data-lucide="${s.icon}" class="w-8 h-8"></i></div>
                    <div><p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">${s.label}</p><h3 class="text-3xl font-black text-slate-900">${s.val}</h3></div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function renderApplicantsTable() {
            const tbody = document.getElementById('applicants-tbody');
            const search = document.getElementById('table-search').value.toLowerCase();
            const filter = document.getElementById('filter-status').value;

            const filtered = applicantData.filter(a => {
                const mSearch = a.nama.toLowerCase().includes(search) || (a.skema && a.skema.toLowerCase().includes(search));
                const mFilter = filter === 'all' || a.status_verifikasi === filter;
                return mSearch && mFilter;
            });

            tbody.innerHTML = filtered.map(a => `
                <tr class="hover:bg-slate-50 transition-all">
                    <!-- Nama -->
                    <td class="px-6 py-4">
                        <p class="text-sm font-semibold text-slate-900 leading-tight">${a.nama}</p>
                        <p class="text-[9px] font-medium text-slate-400">${a.email || '-'}</p>
                    </td>
                    
                    <!-- Instansi -->
                    <td class="px-6 py-4">
                        <p class="text-sm font-semibold text-slate-900 leading-tight">${a.instansi}</p>
                    </td>

                    <!-- Skema -->
                    <td class="px-6 py-4">
                        <span class="text-[9px] font-bold uppercase text-slate-700 bg-slate-100 px-2 py-1 rounded-md border">
                            ${a.skema || '-'}
                        </span>
                    </td>

                    <!-- Batch -->
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="text-[9px] font-bold text-emerald-700 bg-emerald-100 px-2 py-1 rounded-full">
                            ${a.batch_id ? `Batch ${a.batch_id.replace('Batch ', '')}` : '-'}
                        </span>
                    </td>

                    <!-- Pembayaran -->
                    <td class="px-6 py-4">
                        <span onclick="togglePayment('${a.id}', '${a.status_pembayaran}')" 
                            class="text-[9px] px-2 py-1 rounded-full font-bold uppercase cursor-pointer
                            ${a.status_pembayaran === 'sudah bayar' 
                                ? 'bg-emerald-100 text-emerald-700' 
                                : 'bg-red-100 text-red-700'}">
                            ${a.status_pembayaran === 'sudah bayar' ? 'Lunas' : 'Belum'}
                        </span>
                    </td>

                    <!-- Status -->
                    <td class="px-6 py-4">
                        <div class="flex items-center gap-2">
                            <span class="w-2 h-2 rounded-full 
                                ${a.status_verifikasi === 'Terverifikasi' ? 'bg-emerald-500' : 'bg-amber-500'}">
                            </span>
                            <span class="text-[10px] font-semibold text-slate-700">
                                ${a.status_verifikasi || 'Pending'}
                            </span>
                        </div>
                    </td>

                    <!-- Aksi -->
                    <td class="px-6 py-4">
                        <div class="flex items-center justify-center gap-2">
                            <button onclick="openReview('${a.id}')" 
                                class="p-2 bg-slate-100 hover:bg-lsk-green hover:text-white rounded-lg transition-all">
                                <i data-lucide="folder-search" class="w-4 h-4"></i>
                            </button>
                            <button onclick="handleDelete('${a.id}')" 
                                class="p-2 bg-slate-100 hover:bg-red-500 hover:text-white rounded-lg transition-all">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        async function togglePayment(id, current) {
            const next = current === 'sudah bayar' ? 'belum bayar' : 'sudah bayar';
            const { error } = await _supabase.from('pendaftaran').update({ status_pembayaran: next }).eq('id', id);
            if (!error) { showToast(`Status Pembayaran Diperbarui: ${next.toUpperCase()}`); refreshData(); }
        }

        // --- MANAJEMEN BERKAS: LIHAT, UNDUH, HAPUS, UPLOAD ---
        async function openReview(id) {
            const applicant = applicantData.find(a => a.id === id);
            currentApplicant = applicant;
            document.getElementById('review-name').textContent = applicant.nama;
            document.getElementById('review-skema').textContent = applicant.skema || '-';
            document.getElementById('modal-review').classList.remove('hidden');
            await renderReviewGrid();
            document.getElementById('btn-verify').onclick = () => updateVerif(applicant.id, 'Terverifikasi');
            document.getElementById('btn-unverify').onclick = () => updateVerif(applicant.id, 'Belum Verifikasi');
        }

        async function renderReviewGrid() {
            const grid = document.getElementById('berkas-grid');
            grid.innerHTML = `<div class="col-span-full py-20 text-center"><span class="loader"></span><p class="mt-4 text-[10px] font-black uppercase text-slate-400">Menghubungkan ke Storage...</p></div>`;
            
            const configs = [
                { k: 'url_foto', l: 'Pas Foto 3x4' }, { k: 'url_ktp', l: 'KTP' }, { k: 'url_ijazah', l: 'Ijazah' },
                { k: 'url_cv', l: 'CV' }, { k: 'url_sertifikat', l: 'Sertifikat' }, { k: 'url_khusus', l: 'Lainnya' }
            ];

            const res = await Promise.all(configs.map(async c => {
                const path = currentApplicant[c.k];
                if (!path || path === 'NULL' || path === '') return { ...c, ex: false };
                const { data } = await _supabase.storage.from(BUCKET_NAME).createSignedUrl(path, 3600);
                return { ...c, ex: true, url: data?.signedUrl, path };
            }));

            grid.innerHTML = res.map(b => `
                <div class="bg-white rounded-[2rem] border-2 border-slate-100 p-6 flex flex-col group hover:border-lsk-green transition-all duration-300">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-[10px] font-black uppercase text-slate-400 tracking-widest">${b.l}</span>
                        ${b.ex ? `
                        <button onclick="deleteBerkas('${b.k}', '${b.path}')" class="p-2 bg-red-50 text-red-500 rounded-lg hover:bg-red-500 hover:text-white transition-all" title="Hapus Berkas">
                            <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                        </button>` : ''}
                    </div>
                    
                    <div class="flex-1 aspect-video bg-slate-50 rounded-2xl border flex items-center justify-center overflow-hidden mb-6">
                        ${b.ex ? (
                            b.path.match(/\.(jpg|jpeg|png|webp)$/i) 
                            ? `<img src="${b.url}" class="w-full h-full object-cover">` 
                            : `<div class="text-center"><i data-lucide="file-text" class="w-10 h-10 text-slate-300 mx-auto mb-2"></i><p class="text-[8px] font-bold text-slate-400 px-4 break-all">${b.path.split('/').pop()}</p></div>`
                        ) : '<p class="text-[10px] text-slate-300 italic font-black">Berkas Kosong</p>'}
                    </div>

                    <div class="flex gap-2">
                        ${b.ex ? `
                            <a href="${b.url}" target="_blank" class="flex-1 py-3 bg-slate-100 text-slate-600 text-[10px] font-black text-center rounded-xl hover:bg-slate-200 transition-all">LIHAT</a>
                            <button onclick="downloadResource('${b.url}', '${b.path}')" class="flex-1 py-3 bg-emerald-50 text-emerald-700 text-[10px] font-black rounded-xl hover:bg-emerald-100 transition-all">UNDUH</button>
                        ` : `
                            <button onclick="triggerAdminUpload('${b.k}')" class="w-full py-3 bg-lsk-green text-white text-[10px] font-black rounded-xl hover:bg-emerald-900 transition-all flex items-center justify-center gap-2">
                                <i data-lucide="upload" class="w-3.5 h-3.5"></i> UPLOAD ULANG
                            </button>
                        `}
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function triggerAdminUpload(key) { activeUploadKey = key; document.getElementById('admin-upload-input').click(); }

        document.getElementById('admin-upload-input').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file || !activeUploadKey) return;
            showToast("Proses Upload Sedang Berjalan...");
            const fileName = `${Date.now()}_ADMIN_UPLOAD_${file.name.replace(/\s/g, '_')}`;
            const { data, error } = await _supabase.storage.from(BUCKET_NAME).upload(fileName, file);
            if (!error) {
                await _supabase.from('pendaftaran').update({ [activeUploadKey]: data.path }).eq('id', currentApplicant.id);
                showToast("Berkas Berhasil Diperbarui oleh Admin", "success");
                currentApplicant[activeUploadKey] = data.path;
                renderReviewGrid();
            } else showToast("Gagal Upload: " + error.message, "error");
        };

        async function deleteBerkas(key, path) {
            if (!confirm("Hapus berkas ini secara permanen?")) return;
            showToast("Menghapus berkas...");
            await _supabase.storage.from(BUCKET_NAME).remove([path]);
            await _supabase.from('pendaftaran').update({ [key]: null }).eq('id', currentApplicant.id);
            currentApplicant[key] = null;
            renderReviewGrid();
            showToast("Berkas Telah Terhapus", "success");
        }

        async function downloadResource(url, path) {
            try {
                const res = await fetch(url);
                const blob = await res.blob();
                const bUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = bUrl; a.download = path.split('/').pop();
                document.body.appendChild(a); a.click(); window.URL.revokeObjectURL(bUrl);
                showToast("Unduhan Selesai");
            } catch (err) { showToast("Gagal mengunduh", "error"); }
        }

        async function updateVerif(id, status) {
            const { error } = await _supabase.from('pendaftaran').update({ status_verifikasi: status }).eq('id', id);
            if (!error) { showToast(`Status Verifikasi: ${status}`); closeModal('modal-review'); refreshData(); }
        }

        async function handleDelete(id) {
            if (!confirm("Hapus data pendaftar ini secara permanen?")) return;
            await _supabase.from('pendaftaran').delete().eq('id', id);
            showToast("Data Pendaftar Berhasil Dihapus"); refreshData();
        }

        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        // --- PDF GENERATION ---
        function generatePDF(type, batch = null) {  
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            let data = applicantData;
            let title = "LAPORAN PENDAFTAR LSK GLOBAL JAYA LINGKUNGAN";

            // FILTER
            if (type === 'verified') {
                data = data.filter(a => a.status_verifikasi === 'Terverifikasi');
                title += "\n(STATUS: TERVERIFIKASI)";
            }

            if (type === 'unpaid') {
                data = data.filter(a => a.status_pembayaran !== 'sudah bayar');
                title += "\n(STATUS: BELUM LUNAS)";
            }

            // 🔥 FILTER BATCH
            if (type === 'batch' && batch) {
                data = data.filter(a => {
                    if (!a.batch_id) return false;
                    return a.batch_id.replace('Batch ', '') == batch;
                });
                title += `\n(BATCH ${batch})`;
            }

            // HEADER
            doc.setFontSize(14);
            doc.setTextColor(6, 95, 70);
            doc.text(title, 14, 20);

            doc.setFontSize(8);
            doc.setTextColor(100, 116, 139);
            doc.text(`Dicetak: ${new Date().toLocaleString('id-ID')}`, 14, 30);

            // TABLE
            const tableData = data.map((a, i) => [
                i + 1,
                a.nama,
                a.skema || '-',
                a.batch_id || '-',
                a.status_pembayaran === 'sudah bayar' ? 'LUNAS' : 'BELUM',
                a.status_verifikasi || 'Pending'
            ]);

            doc.autoTable({
                head: [['No', 'Nama', 'Skema', 'Batch', 'Pembayaran', 'Verifikasi']],
                body: tableData,
                startY: 35,
                headStyles: { fillColor: [6, 95, 70] },
                styles: { fontSize: 8 }
            });

            doc.save(`Laporan_${type}_${batch || 'all'}.pdf`);
            showToast("PDF Berhasil Dibuat");
        }

        // --- CHARTS ---
        function initCharts() {
            if (mainChart) mainChart.destroy(); if (schemeChart) schemeChart.destroy();
            const days = [...Array(7)].map((_, i) => { const d = new Date(); d.setDate(d.getDate() - i); return d.toISOString().split('T')[0]; }).reverse();
            const trend = days.map(d => applicantData.filter(a => a.created_at && a.created_at.startsWith(d)).length);
            mainChart = new Chart(document.getElementById('chart-applicants'), {
                type: 'line', data: { labels: days.map(d => d.split('-').reverse().slice(0,2).join('/')), datasets: [{ label: 'Pendaftar Baru', data: trend, borderColor: '#065f46', backgroundColor: 'rgba(6,95,70,0.1)', fill: true, tension: 0.4 }] },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
            const sCounts = {}; applicantData.forEach(a => { if(a.skema) sCounts[a.skema] = (sCounts[a.skema] || 0) + 1; });
            schemeChart = new Chart(document.getElementById('chart-schemes'), {
                type: 'doughnut', data: { labels: Object.keys(sCounts), datasets: [{ data: Object.values(sCounts), backgroundColor: ['#065f46', '#facc15', '#0ea5e9', '#f43f5e'] }] },
                options: { maintainAspectRatio: false }
            });
        }

        function showToast(msg, type = 'success') {
            const c = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = `px-8 py-4 rounded-2xl shadow-xl text-white font-black text-[10px] uppercase tracking-widest animate-in flex items-center gap-3 ${type === 'success' ? 'bg-slate-900' : 'bg-red-600'}`;
            t.innerHTML = `<i data-lucide="${type === 'success' ? 'check' : 'alert-circle'}" class="w-4 h-4"></i> ${msg}`;
            c.appendChild(t); lucide.createIcons();
            setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 3000);
        }

        function renderBatchButtons() {
    const container = document.getElementById('batch-buttons');

    const batches = [...new Set(
        applicantData
            .map(a => a.batch_id)
            .filter(b => b)
            .map(b => b.replace('Batch ', ''))
    )];

    container.innerHTML = batches.map(b => `
        <button onclick="generatePDF('batch', '${b}')"
            class="p-4 bg-emerald-50 border border-emerald-200 rounded-2xl 
            hover:bg-emerald-600 hover:text-white transition-all font-bold text-xs uppercase">
            Download Batch ${b}
        </button>
    `).join('');
}
    </script>
    
</body>
</html>
